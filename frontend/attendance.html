<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance — EduCore</title>
<link rel="stylesheet" href="student.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
<div class="sidebar">
  <div class="sb-brand"><div class="sb-logo">🎓</div><div class="sb-name">Edu<span>Core</span></div></div>
  <div class="sb-label">Main</div>
  <a href="student-dashboard.html"><span class="ni">🏠</span>Dashboard</a>
  <a href="personal-details.html"><span class="ni">👤</span>Personal Details</a>
  <div class="sb-label">Academics</div>
  <a href="academic-records.html"><span class="ni">📊</span>Academic Records</a>
  <a href="attendance.html" class="active"><span class="ni">📅</span>Attendance</a>
  <div class="sb-label">Finance</div>
  <a href="fees.html"><span class="ni">💳</span>Fees &amp; Payments</a>
  <div class="sb-label">Campus</div>
  <a href="courses.html"><span class="ni">📚</span>My Courses</a>
  <a href="faculty.html"><span class="ni">👨‍🏫</span>Faculty</a>
  <div class="sb-footer"><button class="logout-btn" onclick="logout()">🚪 Logout</button></div>
</div>
<div class="content">
  <div class="ph"><div><h1>Attendance Record</h1><p>Subject-wise attendance tracking</p></div></div>
  <div class="sc-grid" id="cards" style="display:none;">
    <div class="sc"><div class="slabel">Overall</div><div class="sval" id="s-ov">—</div></div>
    <div class="sc"><div class="slabel">Total Classes</div><div class="sval" id="s-tc">—</div></div>
    <div class="sc"><div class="slabel">Attended</div><div class="sval" id="s-ta">—</div></div>
    <div class="sc"><div class="slabel">Status</div><div class="sval" id="s-st" style="font-size:16px;">—</div></div>
  </div>
  <div class="card">
    <div id="cont"><div class="lw"><div class="spin"></div></div></div>
    <div id="btns" style="display:none;">
      <button class="btn-dl" onclick="dlPDF()">📄 Download Attendance Report</button>
      <button class="btn-sec" onclick="window.print()">🖨️ Print</button>
    </div>
  </div>
</div>
<script>
const BASE='https://superx-backend-celc.onrender.com';
const sid=localStorage.getItem('studentId');
if(!sid){window.location.replace('student-login.html');}
function logout(){localStorage.clear();window.location.replace('student-login.html');}

let rawData=[];

async function load(){
  try{
    const r=await fetch(`${BASE}/student/attendance/${sid}`);
    const data=await r.json();
    if(!data||!data.length){
      document.getElementById('cont').innerHTML='<div class="empty"><div class="ei">📅</div><p>No attendance records found.</p></div>';return;
    }
    rawData=data;
    let tc=0,ta=0;
    const rows=data.map(r=>{
      const t=Number(r.total)||0;const a=Number(r.attended)||0;
      const pct=t>0?Math.round(a/t*100):0;
      tc+=t;ta+=a;
      const col=pct<75?'#ef4444':pct<85?'#f59e0b':'#22c55e';
      const bc=pct<75?'br':pct<85?'by':'bg';
      return`<tr>
        <td style="font-weight:500;">${r.subject}</td><td>${t}</td><td>${a}</td>
        <td><div style="display:flex;align-items:center;gap:10px;">
          <div class="pbar" style="width:90px;"><div class="pfill" style="width:${pct}%;background:${col};"></div></div>
          <span class="badge ${bc}">${pct}%</span>
        </div></td>
        <td style="color:${pct<75?'#fca5a5':'var(--sub)'};">${pct<75?'⚠️ Low':'✅ OK'}</td>
      </tr>`;
    }).join('');
    const ov=tc?Math.round(ta/tc*100):0;
    document.getElementById('cont').innerHTML=`<div class="tw"><table>
      <thead><tr><th>Subject</th><th>Total Classes</th><th>Attended</th><th>Attendance %</th><th>Remarks</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="background:rgba(34,197,94,0.06);">
        <td style="font-weight:700;color:var(--gl);">Overall</td>
        <td style="font-weight:700;color:var(--gl);">${tc}</td>
        <td style="font-weight:700;color:var(--gl);">${ta}</td>
        <td colspan="2" style="font-weight:700;color:var(--gl);">${ov}%</td>
      </tr></tfoot></table></div>
      <div style="margin-top:14px;padding:12px 14px;border-radius:10px;font-size:13px;
        background:${ov<75?'rgba(239,68,68,.07)':'rgba(34,197,94,.07)'};
        border:1px solid ${ov<75?'rgba(239,68,68,.15)':'rgba(34,197,94,.15)'};
        color:${ov<75?'#fca5a5':'#86efac'};">
        ${ov<75?'⚠️ Your overall attendance is below 75%. You may be at risk of detention.':'✅ Your attendance is satisfactory. Keep it up!'}
      </div>`;
    document.getElementById('s-ov').textContent=ov+'%';
    document.getElementById('s-ov').style.color=ov<75?'#fca5a5':'#86efac';
    document.getElementById('s-tc').textContent=tc;
    document.getElementById('s-ta').textContent=ta;
    const st=document.getElementById('s-st');
    st.textContent=ov>=85?'Excellent':ov>=75?'Good':'Low';
    st.style.color=ov>=85?'#86efac':ov>=75?'#fde047':'#fca5a5';
    document.getElementById('cards').style.display='grid';
    document.getElementById('btns').style.display='block';
  }catch(e){
    document.getElementById('cont').innerHTML='<div class="empty"><div class="ei">⚠️</div><p style="color:#fca5a5;">Failed to load. Check backend.</p></div>';
  }
}

function dlPDF(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.setFillColor(22,163,74);doc.rect(0,0,210,28,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont('helvetica','bold');
  doc.text('EduCore — Attendance Report',14,12);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('Student ID: '+sid+'   |   Date: '+new Date().toLocaleDateString('en-IN'),14,21);
  const ov=document.getElementById('s-ov').textContent;
  doc.setTextColor(40);doc.setFontSize(11);doc.setFont('helvetica','bold');
  doc.text('Overall Attendance: '+ov+'   |   Total Subjects: '+rawData.length,14,36);
  const rows=rawData.map(r=>{
    const t=Number(r.total)||0;const a=Number(r.attended)||0;
    const pct=t>0?Math.round(a/t*100):0;
    return[r.subject,t,a,pct+'%',pct<75?'⚠ LOW':'✓ OK'];
  });
  doc.autoTable({
    head:[['Subject','Total Classes','Attended','Percentage','Remarks']],
    body:rows,startY:42,theme:'striped',
    headStyles:{fillColor:[22,163,74],textColor:255,fontStyle:'bold'},
    alternateRowStyles:{fillColor:[240,253,244]},
    bodyStyles:{fontSize:11},
    columnStyles:{4:{halign:'center'}},
    didParseCell:function(d){
      if(d.section==='body'&&d.column.index===4){
        if(d.cell.text[0]==='⚠ LOW')d.cell.styles.textColor=[220,38,38];
        else d.cell.styles.textColor=[22,163,74];
      }
    }
  });
  const fy=doc.lastAutoTable.finalY+10;
  doc.setFontSize(10);doc.setTextColor(100);
  doc.text('Minimum required attendance: 75%',14,fy);
  doc.text('EduCore Student Management System | '+new Date().toLocaleDateString('en-IN'),14,fy+6);
  doc.save('Attendance_Report_'+sid+'.pdf');
}
load();
</script>
</body>
</html>
